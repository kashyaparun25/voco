<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Voco — waveform whose envelope traces a "V": voice made visible. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ee7d7"/>
      <stop offset="0.55" stop-color="#159fd8"/>
      <stop offset="1" stop-color="#0b60c9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdf3ff"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="0.12" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="26"/>
      <feOffset dy="30" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.38"/></feComponentTransfer>
    </filter>
    <filter id="barShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="12" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- cast shadow -->
  <rect x="112" y="104" width="800" height="800" rx="200" fill="#083a63" filter="url(#tileShadow)"/>
  <!-- tile -->
  <rect x="112" y="104" width="800" height="800" rx="200" fill="url(#tile)"/>
  <!-- top gloss + rim light -->
  <rect x="112" y="104" width="800" height="430" rx="200" fill="url(#gloss)"/>
  <rect x="122" y="114" width="780" height="780" rx="190" fill="none" stroke="url(#rim)" stroke-width="4"/>

  <!-- waveform: outer bars tall, center short -> tops trace a V -->
  <g fill="url(#bar)" filter="url(#barShadow)">
    <rect x="189" y="242" width="70" height="540" rx="35"/>
    <rect x="285" y="326" width="70" height="372" rx="35"/>
    <rect x="381" y="396" width="70" height="232" rx="35"/>
    <rect x="477" y="442" width="70" height="140" rx="35"/>
    <rect x="573" y="396" width="70" height="232" rx="35"/>
    <rect x="669" y="326" width="70" height="372" rx="35"/>
    <rect x="765" y="242" width="70" height="540" rx="35"/>
  </g>
</svg>
