name: Release

# Build an ad-hoc signed macOS DMG and publish it to a GitHub Release whenever a
# version tag (e.g. v0.2.0) is pushed. If a HOMEBREW_TAP_TOKEN secret is present,
# the Homebrew cask in kashyaparun25/homebrew-voco is bumped automatically.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14 # Apple Silicon runner -> native aarch64 build
    steps:
      - uses: actions/checkout@v4

      # pnpm >= 10 required: pnpm-workspace.yaml uses the allowBuilds-only
      # format, which pnpm 9's `pnpm store path` rejects ("packages field
      # missing or empty"). Matches the pnpm 11 used for local dev.
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11 requires Node >= 22.13
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build DMG (ad-hoc signed)
        run: >
          npm run tauri build --
          --target aarch64-apple-darwin
          -c src-tauri/tauri.release.conf.json
          --bundles dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true

  bump-cask:
    needs: build-dmg
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Update Homebrew cask (optional)
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "No HOMEBREW_TAP_TOKEN secret set — skipping cask bump."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Voco_${VERSION}_aarch64.dmg"
          echo "Fetching ${DMG_URL}"
          curl -fSL "$DMG_URL" -o voco.dmg
          SHA=$(shasum -a 256 voco.dmg | awk '{print $1}')
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/kashyaparun25/homebrew-voco.git" tap
          sed -i '' -E "s/version \"[^\"]*\"/version \"${VERSION}\"/" tap/Casks/voco.rb
          sed -i '' -E "s/sha256 \"[^\"]*\"/sha256 \"${SHA}\"/" tap/Casks/voco.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "voco ${VERSION}" || { echo "nothing to bump"; exit 0; }
          git push
